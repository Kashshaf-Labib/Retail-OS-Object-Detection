services:
  # ── Inference API + Frontend ──
  api:
    build: .
    container_name: shelf-detection-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models          # Mount weights from host
      - ./experiments:/app/experiments  # Persist experiment logs
    environment:
      - MODEL_PATH=/app/models/best.pt
      - CONFIDENCE_THRESHOLD=0.25
      - IMAGE_SIZE=1280
      - DEVICE=cpu                     # Use "0" if host has NVIDIA GPU + nvidia-docker
    restart: unless-stopped

  # ── Apache Airflow (optional — for ML pipeline visualization) ──
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: shelf-airflow
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
        airflow webserver
      "
    restart: unless-stopped
    profiles:
      - full  # Only starts with: docker compose --profile full up
